<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>AI小白孵化器</title>
<style>
:root{--p:#6C63FF;--s:#FF6584;--a:#2DB86E;--bg:#F0F2F8;--c1:#FFFFFF;--c2:#F5F6FC;--t:#1A1A2E;--m:#6B6B8A;--g:#D4A017;--r:#E74C3C;--w:#FFD700;--bl:#3498DB;--gr:#2ECC71;--or:#E67E22;}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:-apple-system,BlinkMacSystemFont,'Segoe UI','PingFang SC','Hiragino Sans GB','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--t);min-height:100vh;overflow-x:hidden;}
a{color:var(--p);text-decoration:none;}

/* Login Overlay */
#login-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(108,99,255,0.15);backdrop-filter:blur(4px);display:flex;align-items:center;justify-content:center;z-index:9999;transition:opacity .3s;}
#login-overlay.hidden{opacity:0;pointer-events:none;}
.login-panel{background:var(--c1);border-radius:16px;padding:32px 40px 28px;width:340px;box-shadow:0 8px 32px rgba(108,99,255,0.12);animation:loginPop .3s ease-out;}
@keyframes loginPop{from{opacity:0;transform:scale(.85);}to{opacity:1;transform:scale(1);}}
.login-panel h2{font-size:20px;text-align:center;margin-bottom:20px;color:var(--t);}
.login-panel .tabs{display:flex;margin-bottom:18px;border-bottom:1px solid #eee;}
.login-panel .tabs span{flex:1;text-align:center;padding:8px 0;cursor:pointer;color:var(--m);font-size:15px;border-bottom:2px solid transparent;transition:.2s;}
.login-panel .tabs span.active{color:var(--p);border-bottom-color:var(--p);font-weight:600;}
.login-panel input{width:100%;padding:10px 14px;border:1px solid #ddd;border-radius:8px;font-size:14px;margin-bottom:12px;outline:0;transition:.2s;}
.login-panel input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(108,99,255,.12);}
.login-panel .btn-login{width:100%;background:var(--p);color:#fff;border:0;padding:11px;border-radius:8px;font-size:15px;font-weight:600;cursor:pointer;transition:.2s;}
.login-panel .btn-login:hover{opacity:.88;}
.login-panel .btn-login:active{transform:scale(.98);}
.login-panel .error{font-size:13px;color:var(--r);margin-top:8px;text-align:center;min-height:18px;}
.login-panel .success{font-size:13px;color:var(--a);margin-top:8px;text-align:center;min-height:18px;}

/* Fireworks */
#fireworks{position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);pointer-events:none;z-index:9998;display:none;}
.firework{position:absolute;width:12px;height:12px;border-radius:50%;animation:fireworkOut .8s ease-out forwards;opacity:0;}
@keyframes fireworkOut{0%{transform:translate(0,0) scale(1);opacity:1;}100%{transform:translate(var(--dx),var(--dy)) scale(0);opacity:0;}}
.star-fall{position:fixed;top:-30px;font-size:20px;pointer-events:none;z-index:9997;animation:starFall 1.6s ease-out forwards;}
@keyframes starFall{0%{transform:translateY(0) rotate(0deg) scale(1);opacity:1;}100%{transform:translateY(300px) rotate(180deg) scale(0);opacity:0;}}

/* Header */
.hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 20px;background:var(--c1);border-bottom:1px solid #eee;position:sticky;top:0;z-index:100;}
.hdr .logo{display:flex;align-items:center;gap:8px;font-weight:700;font-size:18px;color:var(--p);}
.hdr .logo svg{width:28px;height:28px;}
.hdr .user-area{display:flex;align-items:center;gap:10px;}
.hdr .user-area .avatar{width:32px;height:32px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--s));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:14px;}
.hdr .user-area .nickname{font-size:14px;color:var(--t);font-weight:500;}
.hdr .user-area .logout-btn{padding:4px 10px;font-size:13px;color:var(--m);border:1px solid #ddd;border-radius:6px;cursor:pointer;transition:.2s;background:#fff;}
.hdr .user-area .logout-btn:hover{color:var(--r);border-color:var(--r);}

/* Nav */
.nav{display:flex;gap:2px;padding:10px 20px;background:var(--c1);border-bottom:1px solid #eee;overflow-x:auto;}
.nav .nav-item{padding:8px 18px;font-size:14px;color:var(--m);cursor:pointer;border-radius:8px;white-space:nowrap;transition:.2s;}
.nav .nav-item:hover{color:var(--p);background:var(--c2);}
.nav .nav-item.active{color:#fff;background:var(--p);}

/* Layout */
.layout{display:flex;gap:12px;padding:12px 20px;max-width:1400px;margin:0 auto;}
.main-col{flex:1;min-width:0;}
.side-col{width:220px;flex-shrink:0;display:none;}
.side-col.show{display:block;}

/* Sidebar sections */
.side-box{background:var(--c1);border-radius:12px;padding:14px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.side-box h3{font-size:13px;color:var(--m);margin-bottom:10px;padding-bottom:8px;border-bottom:1px solid var(--c2);}
.side-box ul{list-style:none;}
.side-box li{display:flex;align-items:center;gap:8px;padding:6px 0;font-size:13px;color:var(--t);}
.side-box li .tag{display:inline-block;width:18px;height:18px;border-radius:4px;flex-shrink:0;font-size:10px;line-height:18px;text-align:center;color:#fff;font-weight:600;}
.side-box li a{color:var(--p);font-size:13px;}
.side-box .quote{font-size:13px;color:var(--m);line-height:1.6;}
.side-box .quote .author{font-size:12px;color:var(--p);margin-top:6px;}

/* Pages */
.pg{display:none;animation:pgFade .3s ease;}
@keyframes pgFade{from{opacity:0;transform:translateY(8px);}to{opacity:1;transform:translateY(0);}}
.pg.active{display:block;}

/* Today page */
.today-grid{display:grid;gap:12px;}
.task-card{background:var(--c1);border-radius:12px;padding:16px 18px;margin-bottom:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:.2s;}
.task-card:hover{box-shadow:0 2px 8px rgba(0,0,0,.08);}
.task-card .task-hd{display:flex;align-items:center;gap:8px;margin-bottom:8px;}
.task-card .task-type{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;color:#fff;font-size:11px;font-weight:700;flex-shrink:0;}
.task-card .task-type.th{background:var(--p);}
.task-card .task-type.pr{background:var(--s);}
.task-card .task-type.bns{background:var(--g);}
.task-card .task-name{font-weight:600;font-size:15px;color:var(--t);flex:1;}
.task-card .task-xp{font-size:12px;color:var(--m);}
.task-card .task-desc{font-size:13px;color:var(--m);line-height:1.5;margin-bottom:10px;}
.task-card .task-actions{display:flex;gap:8px;flex-wrap:wrap;}
.task-card .btn-task{padding:6px 14px;font-size:13px;border-radius:8px;border:0;cursor:pointer;transition:.2s;white-space:nowrap;}
.task-card .btn-task.done{background:#E8F5E9;color:var(--a);cursor:default;}
.task-card .btn-task.do{background:var(--p);color:#fff;}
.task-card .btn-task.do:hover{opacity:.85;}

/* Progress bar */
.progress-wrap{background:var(--c1);border-radius:12px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.progress-wrap .prog-hd{display:flex;justify-content:space-between;margin-bottom:8px;}
.progress-wrap .prog-hd span{font-size:14px;color:var(--t);}
.progress-wrap .prog-hd .lvl{font-weight:700;color:var(--p);}
.progress-bar{height:10px;background:var(--c2);border-radius:5px;overflow:hidden;}
.progress-bar .bar{height:100%;background:linear-gradient(90deg,var(--p),var(--s));border-radius:5px;transition:width .5s ease;}

/* Stage dots */
.stage-dots{display:flex;gap:10px;margin-top:10px;justify-content:center;}
.stage-dot{width:10px;height:10px;border-radius:50%;background:#ccc;transition:.3s;}
.stage-dot.active{background:var(--p);box-shadow:0 0 0 3px rgba(108,99,255,.2);}

/* Map page */
.map-stages{display:grid;grid-template-columns:repeat(7,1fr);gap:12px;margin-bottom:20px;}
.map-stage{background:var(--c1);border-radius:12px;padding:14px 12px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04);position:relative;transition:.2s;}
.map-stage:hover{transform:translateY(-2px);box-shadow:0 3px 12px rgba(0,0,0,.08);}
.map-stage .stage-num{width:28px;height:28px;border-radius:50%;background:var(--c2);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:var(--t);margin:0 auto 6px;}
.map-stage .stage-num.done{background:var(--a);color:#fff;}
.map-stage .stage-num.locked{background:#ddd;color:#aaa;}
.map-stage .stage-name{font-size:13px;font-weight:600;color:var(--t);margin-bottom:3px;}
.map-stage .stage-desc{font-size:11px;color:var(--m);line-height:1.3;}
.map-stage.locked{opacity:.5;}
.map-stage.locked .stage-name,.map-stage.locked .stage-desc{color:#aaa;}

/* Achievements */
.ach-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax:180px);gap:12px;}
.ach-card{background:var(--c1);border-radius:12px;padding:14px;text-align:center;box-shadow:0 1px 3px rgba(0,0,0,.04);transition:.2s;position:relative;}
.ach-card:hover{transform:translateY(-2px);box-shadow:0 3px 12px rgba(0,0,0,.08);}
.ach-card .ach-icon{font-size:32px;margin-bottom:6px;}
.ach-card .ach-name{font-size:13px;font-weight:600;color:var(--t);margin-bottom:3px;}
.ach-card .ach-desc{font-size:11px;color:var(--m);line-height:1.4;}
.ach-card .ach-date{font-size:10px;color:var(--p);margin-top:4px;}
.ach-card.locked{opacity:.45;}
.ach-card.locked .ach-name,.ach-card.locked .ach-desc{color:#aaa;}

/* Leaderboard */
.leader-grid{display:grid;gap:8px;}
.leader-row{display:flex;align-items:center;gap:10px;padding:10px 14px;background:var(--c1);border-radius:10px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.leader-row .rank{width:24px;height:24px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:#fff;flex-shrink:0;}
.leader-row .rank.gold{background:linear-gradient(135deg,#FFD700,#FFA500);}
.leader-row .rank.silver{background:linear-gradient(135deg,#C0C0C0,#999);}
.leader-row .rank.bronze{background:linear-gradient(135deg,#CD7F32,#8B4513);}
.leader-row .rank.normal{background:var(--c2);color:var(--m);}
.leader-row .l-avatar{width:28px;height:28px;border-radius:50%;background:linear-gradient(135deg,var(--p),var(--s));display:flex;align-items:center;justify-content:center;color:#fff;font-weight:700;font-size:12px;flex-shrink:0;}
.leader-row .l-name{font-size:14px;font-weight:500;color:var(--t);flex:1;}
.leader-row .l-xp{font-size:13px;color:var(--m);white-space:nowrap;}
.leader-row .l-xp .num{font-weight:700;color:var(--p);}
.leader-row .l-days{font-size:12px;color:var(--m);white-space:nowrap;}

/* Tips & Money */
.tips-list,.money-list{display:grid;gap:10px;}
.tip-card,.money-card{background:var(--c1);border-radius:12px;padding:14px 16px;box-shadow:0 1px 3px rgba(0,0,0,.04);}
.tip-card .tip-title{font-weight:600;font-size:14px;color:var(--t);margin-bottom:4px;}
.tip-card .tip-desc{font-size:13px;color:var(--m);line-height:1.5;}
.money-card .money-title{font-weight:600;font-size:14px;color:var(--t);margin-bottom:4px;}
.money-card .money-desc{font-size:13px;color:var(--m);line-height:1.5;}
.money-card .money-tag{display:inline-block;padding:2px 8px;border-radius:4px;font-size:11px;font-weight:600;margin-top:6px;}
.money-card .tag-junior{background:#E8F5E9;color:var(--a);}
.money-card .tag-mid{background:#FFF3E0;color:#E65100;}
.money-card .tag-senior{background:#E3F2FD;color:var(--p);}

/* Modal */
.mbo{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:500;align-items:center;justify-content:center;}
.mbo.show{display:flex;animation:modalIn .25s ease;}
@keyframes modalIn{from{opacity:0;}to{opacity:1;}}
.mbo .mbo-cont{background:var(--c1);border-radius:16px;padding:24px 28px;width:90%;max-width:420px;max-height:85vh;overflow-y:auto;box-shadow:0 8px 32px rgba(0,0,0,.2);animation:mboPop .25s ease;}
@keyframes mboPop{from{transform:scale(.9);opacity:0;}to{transform:scale(1);opacity:1;}}
.mbo .mbo-hd{font-size:18px;font-weight:700;color:var(--t);margin-bottom:8px;}
.mbo .mbo-name{font-size:15px;color:var(--m);margin-bottom:14px;padding-bottom:10px;border-bottom:1px solid var(--c2);}
.mbo .mbo-desc{font-size:14px;color:var(--m);line-height:1.6;margin-bottom:16px;}
.mbo .mbo-step{font-size:13px;color:var(--p);margin-bottom:10px;font-weight:600;}
.mbo .mbo-q{font-size:14px;color:var(--t);margin-bottom:8px;font-weight:500;}
.mbo .mbo-input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:8px;font-size:14px;outline:0;resize:vertical:12px;min-height:44px;resize:vertical;}
.mbo .mbo-input:focus{border-color:var(--p);box-shadow:0 0 0 3px rgba(108,99,255,.12);}
.mbo .mbo-foot{display:flex;gap:10px;margin-top:16px;}
.mbo .mbo-btn{flex:1;padding:10px 0;border:0;border-radius:8px;font-size:14px;font-weight:600;cursor:pointer;transition:.2s;}
.mbo .mbo-btn.primary{background:var(--p);color:#fff;}
.mbo .mbo-btn.primary:hover{opacity:.88;}
.mbo .mbo-btn.secondary{background:var(--c2);color:var(--t);}
.mbo .mbo-btn.secondary:hover{background:#eaeaea;}
.mbo .mbo-result{text-align:center;padding:12px;font-size:14px;border-radius:8px;margin-top:10px;}
.mbo .mbo-result.success{background:#E8F5E9;color:var(--a);}
.mbo .mbo-result.error{background:#FFEBEE;color:var(--r);}

/* Quick tools */
.quick-tools{display:flex;gap:10px;padding:10px 20px;background:var(--c1);border-top:1px solid #eee;flex-wrap:wrap;justify-content:center;}
.quick-tools .qt-item{display:flex;align-items:center;gap:6px;padding:8px 14px;border-radius:8px;background:var(--c2);font-size:13px;color:var(--m);cursor:pointer;transition:.2s;}
.quick-tools .qt-item:hover{background:var(--p);color:#fff;}

/* Responsive */
@media (max-width:860px){
  .layout{flex-direction:column;}
  .side-col{width:100%;display:flex;flex-wrap:wrap;gap:10px;}
  .side-box{width:calc(50% - 5px);}
  .side-box.full{width:100%;}
  .map-stages{grid-template-columns:repeat(2,1fr);}
  .ach-grid{grid-template-columns:repeat(2,1fr);}
}
@media (max-width:480px){
  .login-panel{width:90%;padding:24px 20px 20px;}
  .side-col{flex-direction:column;}
  .side-box{width:100%;}
  .map-stages{grid-template-columns:1fr;}
  .ach-grid{grid-template-columns:1fr;}
  .layout{padding:8px 12px;}
  .nav{padding:8px 12px;}
}
</style>
</head>
<body>

<!-- Login Overlay -->
<div id="login-overlay">
  <div class="login-panel">
    <h2>🤖 AI小白孵化器</h2>
    <div class="tabs">
      <span class="tab active" onclick="switchTab('login')">登录</span>
      <span class="tab" onclick="switchTab('register')">注册</span>
    </div>
    <div id="login-form">
      <input id="login-username" type="text" placeholder="用户名" autocomplete="username">
      <input id="login-password" type="password" placeholder="密码" autocomplete="current-password">
      <button class="btn-login" onclick="doLogin()">登录</button>
    </div>
    <div id="register-form" style="display:none">
      <input id="reg-username" type="text" placeholder="用户名" autocomplete="username">
      <input id="reg-password" type="password" placeholder="密码" autocomplete="new-password">
      <input id="reg-confirm" type="password" placeholder="确认密码" autocomplete="new-password">
      <button class="btn-login" onclick="doRegister()">注册</button>
    </div>
    <div class="error" id="login-msg"></div>
  </div>
</div>

<!-- Fireworks Container -->
<div id="fireworks"></div>

<!-- Header -->
<header class="hdr">
  <div class="logo">
    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M12 2L2 7l10 5l10-5l-10-5zM2 17l10 5l10-5M2 12l10 5l10-5"/></svg>
    AI小白孵化器
  </div>
  <div class="user-area" id="user-area" style="display:none">
    <div class="avatar" id="user-avatar"></div>
    <span class="nickname" id="user-nickname"></span>
    <button class="logout-btn" onclick="doLogout()">退出</button>
  </div>
</header>

<!-- Nav -->
<nav class="nav">
  <span class="nav-item active" onclick="showPage('today')">今日任务</span>
  <span class="nav-item" onclick="showPage('map')">成长地图</span>
  <span class="nav-item" onclick="showPage('ach')">成就</span>
  <span class="nav-item" onclick="showPage('leaderboard')">排行榜</span>
  <span class="nav-item" onclick="showPage('tips')">技巧库</span>
  <span class="nav-item" onclick="showPage('money')">变现路径</span>
</nav>

<!-- Layout -->
<div class="layout">
  <div class="main-col">
    <!-- Today -->
    <div class="pg active" id="pg-today">
      <div class="progress-wrap">
        <div class="prog-hd">
          <span>等级 <span class="lvl" id="prog-lvl">新手</span></span>
          <span id="prog-xp">0 / 100 XP</span>
        </div>
        <div class="progress-bar"><div class="bar" id="prog-bar" style="width:0%"></div></div>
      </div>
      <div id="day-info" style="font-size:14px;color:var(--m);margin-bottom:12px;"></div>
      <div class="today-grid" id="today-grid"></div>
      <div class="stage-dots" id="stage-dots"></div>
    </div>

    <!-- Map -->
    <div class="pg" id="pg-map">
      <h3 style="margin-bottom:14px;font-size:16px;">🌱 成长地图</h3>
      <div class="map-stages" id="map-stages"></div>
    </div>

    <!-- Achievements -->
    <div class="pg" id="pg-ach">
      <h3 style="margin-bottom:14px;font-size:16px;">🏆 成就系统</h3>
      <div class="ach-grid" id="ach-grid"></div>
    </div>

    <!-- Leaderboard -->
    <div class="pg" id="pg-leaderboard">
      <h3 style="margin-bottom:14px;font-size:16px;">🏅 排行榜</h3>
      <div class="leader-grid" id="leader-grid"></div>
    </div>

    <!-- Tips -->
    <div class="pg" id="pg-tips">
      <h3 style="margin-bottom:14px;font-size:16px;">💡 技巧库</h3>
      <div class="tips-list" id="tips-list"></div>
    </div>

    <!-- Money -->
    <div class="pg" id="pg-money">
      <h3 style="margin-bottom:14px;font-size:16px;">💰 变现路径</h3>
      <div class="money-list" id="money-list"></div>
    </div>
  </div>

  <!-- Sidebar -->
  <div class="side-col" id="side-col">
    <div class="side-box">
      <h3>🔧 推荐工具</h3>
      <ul id="side-tools"></ul>
    </div>
    <div class="side-box">
      <h3>💬 社区</h3>
      <ul id="side-community"></ul>
    </div>
    <div class="side-box">
      <h3>📚 学习资源</h3>
      <ul id="side-learning"></ul>
    </div>
    <div class="side-box">
      <h3>✨ 今日金句</h3>
      <div class="quote" id="daily-quote"></div>
    </div>
  </div>
</div>

<!-- Quick Tools -->
<div class="quick-tools" id="quick-tools"></div>

<!-- Task Modal -->
<div class="mbo" id="task-modal">
  <div class="mbo-cont">
    <div class="mbo-hd" id="mbo-hd"></div>
    <div class="mbo-name" id="mbo-name"></div>
    <div class="mbo-desc" id="mbo-desc"></div>
    <div class="mbo-step" id="mbo-step"></div>
    <div id="mbo-body"></div>
    <div class="mbo-foot" id="mbo-foot"></div>
  </div>
</div>

<script>
// ====== CONSTANTS ======
const LVS = [
  {lvl:1,name:'新手',xp:0,color:'#95A5A6'},
  {lvl:2,name:'学徒',xp:100,color:'#3498DB'},
  {lvl:3,name:'熟手',xp:300,color:'#2ECC71'},
  {lvl:4,name:'能手',xp:600,color:'#F39C12'},
  {lvl:5,name:'高手',xp:1200,color:'#E74C3C'},
  {lvl:6,name:'专家',xp:2500,color:'#9B59B6'},
  {lvl:7,name:'大师',xp:5000,color:'#D4A017'},
  {lvl:8,name:'宗师',xp:10000,color:'#E67E22'}
];

const STAGES = [
  {id:1,name:'启蒙',desc:'了解AI基础概念',goal:'完成Day1-3'},
  {id:2,name:'入门',desc:'掌握基本操作',goal:'完成Day4-6'},
  {id:3,name:'探索',desc:'尝试不同场景',goal:'完成Day7-9'},

// ====== USER MANAGEMENT ======
function hashPassword(pwd) {
  let hash = 0;
  for(let i=0;i<pwd.length;i++){
    hash = ((hash<<5)-hash)+pwd.charCodeAt(i);
    hash = hash&hash;
  }
  return hash.toString(16);
}

function getUsers() {
  return JSON.parse(localStorage.getItem('aiHatchUsers')||'[]');
}

function saveUsers(users) {
  localStorage.setItem('aiHatchUsers',JSON.stringify(users));
}

function getCurrentUser() {
  return JSON.parse(localStorage.getItem('aiHatchUser'));
}

function saveCurrentUser(user) {
  localStorage.setItem('aiHatchUser',JSON.stringify(user));
}

function findUser(username) {
  const users = getUsers();
  return users.find(u=>u.username===username);
}

function registerUser(username,password) {
  const users = getUsers();
  if(users.find(u=>u.username===username)) return {ok:false,msg:'用户名已存在'};
  const user = {
    username,
    passwordHash:hashPassword(password),
    registerTime:new Date().toISOString(),
    xp:0,
    dayReached:0,
    completedTasks:0,
    completed:[],
    achievements:[]
  };
  users.push(user);
  saveUsers(users);
  return {ok:true,user};
}

function loginUser(username,password) {
  const user = findUser(username);
  if(!user) return {ok:false,msg:'用户不存在'};
  if(user.passwordHash!==hashPassword(password)) return {ok:false,msg:'密码错误'};
  return {ok:true,user};
}

function updateUserProgress(taskId,type,xp,lvl) {
  const user = getCurrentUser();
  const users = getUsers();
  const idx = users.findIndex(u=>u.username===user.username);
  if(idx===-1) return;
  const existing = users[idx].completed.find(t=>t.taskId===taskId);
  if(existing) return;
  users[idx].completed.push({taskId,type,xp,day:parseInt(taskId.split('-')[0].substring(1)),date:new Date().toISOString()});
  users[idx].xp+=xp;
  users[idx].completedTasks++;
  const maxDay = Math.max(...users[idx].completed.map(t=>t.day),0);
  users[idx].dayReached=Math.max(users[idx].dayReached,maxDay);
  saveUsers(users);
  saveCurrentUser(users[idx]);
}

// ====== LOGIN UI ======
function switchTab(mode) {
  document.querySelectorAll('.login-panel .tab').forEach(t=>t.classList.remove('active'));
  if(mode==='login'){
    document.querySelector('.login-panel .tabs span:first-child').classList.add('active');
    document.getElementById('login-form').style.display='block';
    document.getElementById('register-form').style.display='none';
  }else{
    document.querySelector('.login-panel .tabs span:last-child').classList.add('active');
    document.getElementById('login-form').style.display='none';
    document.getElementById('register-form').style.display='block';
  }
  document.getElementById('login-msg').textContent='';
}

function doLogin() {
  const u = document.getElementById('login-username').value.trim();
  const p = document.getElementById('login-password').value;
  if(!u||!p){document.getElementById('login-msg').textContent='请填写用户名和密码';return;}
  const res = loginUser(u,p);
  if(res.ok){
    saveCurrentUser(res.user);
    document.getElementById('login-overlay').classList.add('hidden');
    initApp();
  }else{
    document.getElementById('login-msg').textContent=res.msg;
  }
}

function doRegister() {
  const u = document.getElementById('reg-username').value.trim();
  const p = document.getElementById('reg-password').value;
  const c = document.getElementById('reg-confirm').value;
  if(!u||!p||!c){document.getElementById('login-msg').textContent='请填写所有信息';return;}
  if(u.length<3){document.getElementById('login-msg').textContent='用户名至少3个字符';return;}
  if(p.length<6){document.getElementById('login-msg').textContent='密码至少6个字符';return;}
  if(p!==c){document.getElementById('login-msg').textContent='两次密码不一致';return;}
  const res = registerUser(u,p);
  if(res.ok){
    saveCurrentUser(res.user);
    document.getElementById('login-overlay').classList.add('hidden');
    initApp();
  }else{
    document.getElementById('login-msg').textContent=res.msg;
  }
}

function doLogout() {
  localStorage.removeItem('aiHatchUser');
  location.reload();
}

// ====== FIREWORKS ======
function playFireworks() {
  const fw = document.getElementById('fireworks');
  fw.style.display='block';
  const colors = ['#FF6584','#6C63FF','#2DB86E','#D4A017','#3498DB','#E74C3C','#9B59B6','#E67E22'];
  const angles = [0,72,144,216,288];
  const particles = ['💥','✨','🌟','💫','🎉','🎊','⭐','🔮'];
  for(let i=0;i<5;i++){
    const p = document.createElement('div');
    p.className='firework';
    const angle = angles[i]*Math.PI/180;
    const dist = 80+Math.random()*40;
    p.style.setProperty('--dx',Math.cos(angle)*dist+'px');
    p.style.setProperty('--dy',Math.sin(angle)*dist+'px');
    p.style.backgroundColor=colors[i%colors.length];
    p.textContent=particles[i];
    p.style.fontSize='16px';
    p.style.width='auto';
    p.style.height='auto';
    p.style.borderRadius='0';
    p.style.animationDelay=i*0.08+'s';
    fw.appendChild(p);
  }
  // Stars falling
  for(let i=0;i<5;i++){
    const s = document.createElement('div');
    s.className='star-fall';
    s.textContent='⭐';
    s.style.left=(30+i*10)+'%';
    s.style.fontSize=(18+Math.random()*8)+'px';
    s.style.animationDelay=i*0.15+'s';
    document.body.appendChild(s);
    setTimeout(()=>s.remove(),2000);
  }
  setTimeout(()=>{fw.style.display='none';fw.innerHTML='';},2000);
}

// ====== PROGRESS ======
function updateProgress() {
  const user = getCurrentUser();
  if(!user) return;
  // Find level
  let lvl = LVS[0];
  for(let i=LVS.length-1;i>=0;i--){
    if(user.xp>=LVS[i].xp){lvl=LVS[i];break;}
  }
  const nextLvl = LVS.find(l=>l.lvl===lvl.lvl+1);
  const maxXP = nextLvl?nextLvl.xp:LVS[LVS.length-1].xp;
  const pct = nextLvl?Math.min(100,(user.xp-lvl.xp)/(maxXP-lvl.xp)*100):100;
  document.getElementById('prog-lvl').textContent=lvl.name;
  document.getElementById('prog-xp').textContent=`${user.xp} / ${maxXP} XP`;
  document.getElementById('prog-bar').style.width=pct+'%';
  // Stage dots
  const dotsEl = document.getElementById('stage-dots');
  dotsEl.innerHTML=STAGES.map((s,i)=>`<div class="stage-dot ${user.dayReached>=(s.id*3)?'active':''}" title="${s.name}"></div>`).join('');
}

function renderToday() {
  const user = getCurrentUser();
  const currDay = Math.min(user.dayReached+1,21);

  if(!day) return;
  const completedIds = user.completed.map(t=>t.taskId);
  document.getElementById('day-info').innerHTML=`<b>${day.title}</b> — 距离出师还有 <b>${21-currDay}</b> 天`;
  document.getElementById('today-grid').innerHTML=day.tasks.map(t=>{
    const done = completedIds.includes(t.id);

      <div class="task-hd">

        <span class="task-xp">+${t.xp} XP</span>

      <div class="task-actions">
        ${done?`<button class="btn-task done">✓ 已完成</button>`:
          `<button class="btn-task do" onclick="openVerifyModal('${t.id}','${t.type}','${t.name}','${t.desc}',${t.xp})">完成</button>`}
      </div>
    </div>`;
  }).join('');
}

// ====== VERIFICATION MODAL ======
let verifyTask = null;
function openVerifyModal(taskId,type,name,desc,xp) {
  verifyTask = {taskId,type,name,desc,xp};
  document.getElementById('task-modal').classList.add('show');
  document.getElementById('mbo-hd').textContent='任务验证';
  document.getElementById('mbo-name').textContent=name;
  document.getElementById('mbo-desc').textContent=desc;
  document.getElementById('mbo-step').textContent='验证方式：';
  document.getElementById('mbo-body').innerHTML='';
  document.getElementById('mbo-foot').innerHTML='';
  // Step 1: Show verification method
  showVerifyStep1();
}

function showVerifyStep1() {
  const t = verifyTask.type;
  let body = '';
  if(t==='th'){
    const qs = VERIFY_QUESTIONS.th||[];
    const q = qs[parseInt(verifyTask.taskId.split('-')[0].substring(1))-1]||qs[0]||qs[qs.length-1];
    body=`<div class="mbo-q">📝 理论验证题：</div>
      <div style="font-size:14px;color:var(--t);margin-bottom:10px;font-weight:500;">${q.q}</div>
      <textarea class="mbo-input" id="mbo-answer" placeholder="请输入你的答案..." rows="3"></textarea>`;
  }else if(t==='pr'){
    body=`<div class="mbo-q">📸 实践验证：</div>
      <div style="font-size:13px;color:var(--m);margin-bottom:10px;">请描述你完成了什么操作（代替截图上传）</div>
      <textarea class="mbo-input" id="mbo-answer" placeholder="请描述你的操作步骤和结果..." rows="4"></textarea>`;
  }else{
    const qs = VERIFY_QUESTIONS.bns||[];
    const q = qs[parseInt(verifyTask.taskId.split('-')[0].substring(1))-1]||qs[qs.length-1];
    body=`<div class="mbo-q">🎭 彩蛋验证：</div>
      <div style="font-size:14px;color:var(--t);margin-bottom:10px;font-weight:500;">${q.q}</div>
      <textarea class="mbo-input" id="mbo-answer" placeholder="发挥你的想象力..." rows="3"></textarea>`;
  }
  document.getElementById('mbo-body').innerHTML=body;
  document.getElementById('mbo-foot').innerHTML=[
    `<button class="mbo-btn secondary" onclick="closeModal()">取消</button>`,
    `<button class="mbo-btn primary" onclick="submitVerify()">提交验证</button>`
  ].join('');
}

function submitVerify() {
  const answer = document.getElementById('mbo-answer').value.trim();
  if(!answer){document.getElementById('mbo-body').innerHTML+='<div class="mbo-result error">请输入答案或描述</div>';return;}
  const t = verifyTask.type;
  let pass = false;
  if(t==='th'){
    const qs = VERIFY_QUESTIONS.th;
    const idx = parseInt(verifyTask.taskId.split('-')[0].substring(1))-1;
    const q = qs[idx]||qs[qs.length-1];
    const keywords = q.a.split(',').map(k=>k.trim().toLowerCase());
    const ansLower = answer.toLowerCase();
    pass = keywords.some(k=>ansLower.includes(k));
  }else if(t==='pr'){
    pass = answer.length>=10;
  }else{
    pass = true;
  }
  if(pass){
    document.getElementById('mbo-body').innerHTML='<div class="mbo-result success">✅ 验证通过！已获得 '+verifyTask.xp+' XP</div>';
    document.getElementById('mbo-foot').innerHTML='<button class="mbo-btn primary" onclick="closeModalAndComplete()">确定</button>';
  }else{
    document.getElementById('mbo-body').innerHTML='<div class="mbo-result error">❌ 验证未通过，请重新阅读任务描述后重试</div>';
    document.getElementById('mbo-foot').innerHTML=[
      '<button class="mbo-btn secondary" onclick="closeModal()">关闭</button>',
      '<button class="mbo-btn primary" onclick="showVerifyStep1()">重新提交</button>'
    ].join('');
  }
}

function closeModalAndComplete() {
  const user = getCurrentUser();

}

// ====== LEADERBOARD ======
function renderLeaderboard() {
  const users = getUsers();
  // Sort by XP desc, then by completedTasks desc
  const sorted = [...users].sort((a,b)=>{
    if(b.xp!==a.xp) return b.xp-a.xp;
    return b.completedTasks-a.completedTasks;
  });
  document.getElementById('leader-grid').innerHTML=sorted.map((u,i)=>{
    let rankClass = 'normal';
    if(i===0) rankClass='gold';
    else if(i===1) rankClass='silver';
    else if(i===2) rankClass='bronze';
    const lvl = LVS.find(l=>u.xp>=l.xp||l.lvl===LVS[LVS.length-1].lvl);
    return `<div class="leader-row">
      <div class="rank ${rankClass}">${i+1}</div>
      <div class="l-avatar">${u.username.charAt(0).toUpperCase()}</div>
      <span class="l-name">${u.username}</span>
      <span class="l-xp"><span class="num">${u.xp} XP</span> (${lvl?.name||'新手'})</span>
      <span class="l-days">Day ${u.dayReached}</span>
    </div>`;
  }).join('');
}
